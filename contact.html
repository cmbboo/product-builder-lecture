<!doctype html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>제휴 문의 | 로또 번호 생성기</title>
  <link href="style.css" rel="stylesheet">
  <link href="contact.css" rel="stylesheet">
</head>
<body>
  <button id="themeToggle" aria-label="테마 전환">🌙</button>

  <div class="container form-container">
    <a href="index.html" class="back-link">← 돌아가기</a>
    <h1>🤝 제휴 문의</h1>
    <p class="subtitle">아래 양식을 작성해 주시면 빠르게 연락드리겠습니다.</p>

    <form id="contactForm" action="https://formspree.io/f/xqejdzkw" method="POST">
      <div class="field">
        <label for="name">이름 *</label>
        <input type="text" id="name" name="name" placeholder="홍길동" required />
      </div>

      <div class="field">
        <label for="company">회사명</label>
        <input type="text" id="company" name="company" placeholder="(주)회사이름" />
      </div>

      <div class="field">
        <label for="email">이메일 *</label>
        <input type="email" id="email" name="email" placeholder="example@company.com" required />
      </div>

      <div class="field">
        <label for="phone">연락처</label>
        <input type="tel" id="phone" name="phone" placeholder="010-0000-0000" />
      </div>

      <div class="field">
        <label for="message">문의 내용 *</label>
        <textarea id="message" name="message" rows="5" placeholder="제휴 관련 문의 내용을 자유롭게 작성해 주세요." required></textarea>
      </div>

      <button type="submit" id="submitBtn">문의 보내기</button>
    </form>

    <div id="successMsg" class="success-msg hidden">
      ✅ 문의가 성공적으로 전송됐습니다. 빠르게 연락드리겠습니다!
    </div>
  </div>

  <script src="main.js"></script>
  <script src="contact.js"></script>
</body>
</html>
